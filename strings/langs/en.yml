song_5 : "❍ ɴᴏᴛ ᴀ ᴠᴀʟɪᴅ ʏᴏᴜᴛᴜʙᴇ ʟɪɴᴋ."
song_6 : "❍ ɢᴇᴛᴛɪɴɢ ꜰᴏʀᴍᴀᴛs...\n\nᴘʟᴇᴀsᴇ ᴡᴀɪᴛ..."
song_7 : "❍ ꜰᴀɪʟᴇᴅ ᴛᴏ ɢᴇᴛ ᴀᴠᴀɪʟᴀʙʟᴇ ꜰᴏʀᴍᴀᴛs ꜰᴏʀ ᴛʜᴇ ᴠɪᴅᴇᴏ. ᴘʟᴇᴀsᴇ ᴛʀʏ ᴀɴʏ ᴏᴛʜᴇʀ ᴛʀᴀᴄᴋ."
song_8 : "❍ ᴅᴏᴡɴʟᴏᴀᴅ sᴛᴀʀᴛᴇᴅ\n\nᴘʟᴇᴀsᴇ ʜᴏʟᴅ ᴏɴ ғᴏʀ ғᴇᴡ sᴇᴄᴏɴᴅs..."
song_9 : "❍ ꜰᴀɪʟᴇᴅ ᴛᴏ ᴅᴏᴡɴʟᴏᴀᴅ sᴏɴɢ ꜰʀᴏᴍ ʏᴛ-ᴅʟ\n\n**ʀᴇᴀsᴏɴ:** {0}"
song_10 : "❍ ꜰᴀɪʟᴇᴅ ᴛᴏ ᴜᴘʟᴏᴀᴅ ᴏɴ ᴛᴇʟᴇɢʀᴀᴍ sᴇʀᴠᴇʀs."
song_11 : "❍ ᴜᴘʟᴏᴀᴅɪɴɢ sᴛᴀʀᴛᴇᴅ ʙᴀʙʏ\n\nᴘʟᴇᴀsᴇ ʜᴏʟᴅ ᴏɴ..."

clone_help : "<b><u>❍ ᴄʟᴏɴᴇ ʙᴏᴛ ᴄᴏᴍᴍᴀɴᴅs :</u></b>\n\n<b><u>❍ ᴜsᴇʀ ᴄᴏᴍᴍᴀɴᴅs :</u></b>\n\n/clone [ʙᴏᴛ_ᴛᴏᴋᴇɴ] : ᴄʟᴏɴᴇ ʏᴏᴜʀ ʙᴏᴛ.\n/rmbot [ʙᴏᴛ_ᴛᴏᴋᴇɴ] : ᴅᴇʟᴇᴛᴇ ʏᴏᴜʀ ᴄʟᴏɴᴇᴅ ʙᴏᴛ.\n/mybot : ʟɪsᴛ ʏᴏᴜʀ ᴄʟᴏɴᴇᴅ ʙᴏᴛs.\n\n<b><u>❍ sᴜᴅᴏ ᴄᴏᴍᴍᴀɴᴅs :</u></b>\n\n/cloned : ᴄʜᴇᴄᴋ ᴛᴏᴛᴀʟ ᴄʟᴏɴᴇᴅ ʙᴏᴛs.\n/totalbots : ᴄʜᴇᴄᴋ ᴛᴏᴛᴀʟ ᴄʟᴏɴᴇᴅ ʙᴏᴛs.\n/clonedinfo : ɢᴇᴛ ɪɴғᴏ ᴏғ ᴀʟʟ ᴄʟᴏɴᴇᴅ ʙᴏᴛs.\n/delallclone : ᴅᴇʟᴇᴛᴇ ᴀʟʟ ᴄʟᴏɴᴇᴅ ʙᴏᴛs.\n/delclone : ᴅᴇʟᴇᴛᴇ ᴀʟʟ ᴄʟᴏɴᴇs ᴏғ ᴀ ᴜsᴇʀ (ʀᴇᴘʟʏ).\n/restartclone : ʀᴇsᴛᴀʀᴛ ᴀʟʟ ᴄʟᴏɴᴇs ᴏғ ᴀ ᴜsᴇʀ (ʀᴇᴘʟʏ).\n/clonebroadcast : ʙʀᴏᴀᴅᴄᴀsᴛ ᴛᴏ ᴀʟʟ ᴄʟᴏɴᴇ ᴏᴡɴᴇʀs."
